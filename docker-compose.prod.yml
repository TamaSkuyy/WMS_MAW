services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: wms-wma-app:prod
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8090}:8080"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      # Tambahkan env lain yang dibutuhkan dari .env.prod
    env_file:
      - .env.prod
    volumes:
      - storage-vol:/var/www/html/storage
    depends_on:
      - redis
      - mysql
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8080/health/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - storage-vol:/var/www/html/storage
      - ./public:/var/www/html/public
    depends_on:
      - app

  queue:
    image: wms-wma-app:prod
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3
    env_file:
      - .env.prod
    volumes:
      - storage-vol:/var/www/html/storage
    depends_on:
      - redis
      - mysql

  scheduler:
    image: wms-wma-app:prod
    restart: unless-stopped
    command: php artisan schedule:work
    env_file:
      - .env.prod
    volumes:
      - storage-vol:/var/www/html/storage
    depends_on:
      - redis
      - mysql

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-vol:/var/lib/mysql

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-vol:/data

volumes:
  mysql-vol:
  redis-vol:
  storage-vol:
